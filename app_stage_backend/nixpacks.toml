# Nixpacks configuration for Laravel + Vite
[phases.setup]
nixPkgs = ["php83", "php83Packages.composer", "nodejs_20"]

[phases.install]
dependsOn = ["setup"]
cmds = ["composer install --no-interaction --no-dev --optimize-autoloader", "npm install"]

[phases.build]
dependsOn = ["install"]
cmds = ["npm run build", "php artisan route:cache", "php artisan view:cache"]

[start]
cmd = "bash start.sh"
